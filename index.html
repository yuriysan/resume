<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuriy Sannikov — Technical Product Owner & Solution Architect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8F7F4;
    --bg2: #F2F0EC;
    --text: #242220;
    --text-muted: #7A7570;
    --accent: #5C6B7A;
    --accent-warm: #8C8078;
    --divider: #E4E1DB;
    --border: #CCC9C2;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 24px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(248,247,244,0.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s;
  }
  nav.scrolled { border-color: var(--divider); }
  .nav-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 18px;
    letter-spacing: 0.04em;
    color: var(--text);
    text-decoration: none;
  }
  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }
  .nav-links a {
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }

  /* CONTAINER */
  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 48px;
  }

  /* HERO */
  #hero {
    padding: 180px 0 120px;
    min-height: 100vh;
    display: flex;
    align-items: center;
  }
  .hero-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: end;
  }
  .hero-left {}
  .hero-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s 0.1s forwards;
  }
  .hero-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(54px, 7vw, 88px);
    line-height: 1.0;
    letter-spacing: -0.01em;
    color: var(--text);
    opacity: 0;
    animation: fadeUp 0.9s 0.2s forwards;
  }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 2.5vw, 26px);
    font-weight: 300;
    font-style: italic;
    color: var(--text-muted);
    margin-top: 16px;
    opacity: 0;
    animation: fadeUp 0.9s 0.35s forwards;
  }
  .hero-tagline {
    margin-top: 40px;
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.8;
    max-width: 420px;
    opacity: 0;
    animation: fadeUp 0.9s 0.5s forwards;
  }
  .hero-cta {
    margin-top: 52px;
    display: flex;
    gap: 16px;
    opacity: 0;
    animation: fadeUp 0.9s 0.65s forwards;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
    border: 1px solid var(--border);
    color: var(--text);
    background: transparent;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:hover::after { opacity: 0.04; }
  .btn-primary {
    background: var(--text);
    border-color: var(--text);
    color: var(--bg);
  }
  .btn-primary::after { background: white; }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); color: var(--bg); }

  .hero-right {
    padding-bottom: 8px;
    opacity: 0;
    animation: fadeUp 1s 0.4s forwards;
  }
  .hero-stat-list {
    display: flex;
    flex-direction: column;
    gap: 32px;
  }
  .hero-stat { border-left: 1px solid var(--divider); padding-left: 24px; }
  .hero-stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    line-height: 1;
    color: var(--text);
  }
  .hero-stat-label {
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .hero-location {
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-top: 2px;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
    from { opacity: 0; transform: translateY(20px); }
  }

  /* rest of the styles omitted for brevity... */
</style>
</head>
<body>
<!-- content would continue here -->
</body>
</html>
